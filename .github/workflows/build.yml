name: Compilar APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # permite lanzarlo manualmente desde la web de GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generar Gradle Wrapper
        run: gradle wrapper --gradle-version 8.4

      - name: Dar permisos a gradlew
        run: chmod +x gradlew

      - name: Compilar APK (debug)
        run: ./gradlew assembleDebug --no-daemon

      - name: Subir APK como descargable
        uses: actions/upload-artifact@v4
        with:
          name: DarDeBaja-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
